name: release ws-server exe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup py
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: python -m pip install --upgrade pip && pip install pyinstaller -r ws-server/requirements.txt

      - name: build ws-server exe
        working-directory: ws-server
        run: >
          python -m PyInstaller --onefile --windowed --add-data "assets;assets" --add-data "services;services" --icon="assets/icon.ico" --name="input-overlay-ws" --hidden-import=services.analog --hidden-import=services.consts --hidden-import=services.logger --hidden-import=services.utils --hidden-import=services.dialogs --hidden-import=services.settings --hidden-import=services.tray --hidden-import=services.rawinput --hidden-import=winotify --hidden-import=certifi --hidden-import=markdown --manifest admin.manifest input-overlay-ws.py

      - name: create windows zip
        working-directory: ws-server
        run: |
          mkdir windows-release
          copy dist\input-overlay-ws.exe windows-release\
          powershell Compress-Archive -Path windows-release\* -DestinationPath ..\input-overlay-ws-windows.zip

      - name: attest windows build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: input-overlay-ws-windows.zip

      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: input-overlay-ws-windows.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup py
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev libhidapi-dev

      - name: install deps
        run: python -m pip install --upgrade pip && pip install pyinstaller -r ws-server/requirements.txt

      - name: build ws-server binary
        working-directory: ws-server
        run: >
          python -m PyInstaller --onefile --windowed --add-data "assets:assets" --add-data "services:services" --icon="assets/icon.ico" --name="input-overlay-ws" --hidden-import=services.analog --hidden-import=services.consts --hidden-import=services.logger --hidden-import=services.utils --hidden-import=services.dialogs --hidden-import=services.settings --hidden-import=services.tray --hidden-import=certifi --hidden-import=markdown input-overlay-ws.py

      - name: create linux zip
        working-directory: ws-server
        run: |
          mkdir linux-release
          cp dist/input-overlay-ws linux-release/
          cd linux-release && zip -r ../../input-overlay-ws-linux.zip .

      - name: attest linux build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: input-overlay-ws-linux.zip

      - name: upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: input-overlay-ws-linux.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-zip

      - name: get previous tag
        id: prev_tag
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      - name: make release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            input-overlay-ws-windows.zip
            input-overlay-ws-linux.zip
          body: |
            ## input-overlay websocket server ${{ github.ref_name }}

            # **patchnotes:**

            -



            ## **windows setup:**

            - download `input-overlay-ws-windows.zip`

            - unzip and run `input-overlay-ws.exe`

            - right-click the tray icon for settings



            ## **linux setup (experimental):**

            -   download `input-overlay-ws-linux.zip`
            -   **linux perms needed:** keyboard/mouse capture and analog devices need access to `/dev/input`, `/dev/hidraw`, and `/dev/bus/usb`:

                ```bash
                # for general inputs
                sudo usermod -aG input $USER
                # for hidraw and usb devices (analog keyboards)
                echo 'KERNEL=="hidraw*", SUBSYSTEM=="hidraw", MODE="0660", GROUP="input"' | sudo tee /etc/udev/rules.d/99-input-overlay.rules
                echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="31e3", MODE="0660", GROUP="input"' | sudo tee -a /etc/udev/rules.d/99-input-overlay.rules
                sudo udevadm control --reload-rules && sudo udevadm trigger
                ```
            -  **restart** for the group change and usb rule to take effect
            -   unzip and run `./input-overlay-ws`
            -   left-click or right-click the tray icon for settings
            -   if the tray icon doesn't appear, a control window will open automatically instead


            ---

            ${{ steps.prev_tag.outputs.tag != '' && format('[CHANGELOG]({0}/{1}/compare/{2}...{3})', github.server_url, github.repository, steps.prev_tag.outputs.tag, github.ref_name) || 'First release.' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}